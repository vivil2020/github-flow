# GitHub Pages 自动部署工作流
# 当代码合并到 main 分支时自动构建并推送到 gh-pages 分支

name: Deploy to GitHub Pages

# 触发条件
on:
  push:
    # 仅当推送到 main 分支时触发
    branches: [main]

# 权限控制
permissions:
  contents: write         # 需要写权限来推送分支

# 并发控制：防止多个部署任务同时执行
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # 任务：构建项目并推送到 gh-pages 分支
  build-and-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 pnpm 包管理器（自动读取 packageManager 字段）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 安装 Node.js 并启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 构建项目（Vite 默认输出到 dist 目录）
      - name: Build project
        run: pnpm build

      # 检查构建产物
      - name: List dist contents
        run: ls -la ./dist

      # 复制 index.html 为 404.html（解决 GitHub Pages 子路径访问问题）
      - name: Create 404.html
        run: cp ./dist/index.html ./dist/404.html

      # 将构建产物推送到 gh-pages 分支
      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
