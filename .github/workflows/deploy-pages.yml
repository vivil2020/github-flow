# GitHub Pages 自动部署工作流
# 当代码合并到 main 分支时自动构建并部署到 GitHub Pages

name: Deploy to GitHub Pages

# 触发条件
on:
  push:
    # 仅当推送到 main 分支时触发
    branches: [main]

# 权限控制
permissions:
  contents: read          # 读取仓库内容
  pages: write            # 写入 GitHub Pages
  id-token: write         # 用于部署认证

# 并发控制：防止多个部署任务同时执行
concurrency:
  group: 'pages'
  cancel-in-progress: false

jobs:
  # 任务1：构建项目
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      # 检出代码
      - name: Checkout
        uses: actions/checkout@v4

      # 安装 pnpm 包管理器（自动读取 package.json 中的 packageManager 字段）
      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      # 安装 Node.js 并启用 pnpm 缓存
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 安装项目依赖
      - name: Install dependencies
        run: pnpm install

      # 构建项目（Vite 默认输出到 dist 目录）
      - name: Build project
        run: pnpm build

      # 检查构建产物
      - name: List dist contents
        run: ls -la ./dist

      # 上传构建产物到 GitHub Pages
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 上传构建输出目录
          path: ./dist

  # 任务2：部署到 GitHub Pages
  deploy:
    name: Deploy
    needs: build          # 等待构建任务完成
    runs-on: ubuntu-latest
    
    # 部署环境配置
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # 部署到 GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
